allow-lan: false
ipv6: true
external-controller: 127.0.0.1:9090
profile:
  store-selected: true
  store-fake-ip: false
unified-delay: true
tcp-concurrent: true
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

dns:
  enable: true
  cache-algorithm: arc
  ipv6: true
  enhanced-mode: redir-host
  respect-rules: true
  default-nameserver:
  - system
  - https://223.5.5.5/dns-query
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
  proxy-server-nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  direct-nameserver:
  - system
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  nameserver:
  - https://dns.cloudflare.com/dns-query
  - https://dns.google/dns-query

sniffer:
  enable: true
#  force-dns-mapping: true
#  parse-pure-ip: true
#  override-destination: false
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
#      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - "udp://any:53"
    - "tcp://any:53"
  strict-route: true

listeners:
- name: mixed-in
  type: mixed
  port: 7890
  listen: 127.0.0.1
  udp: true

#port: 7890
#socks-port: 7891
#mixed-port: 7892
#redir-port: 7893
#tproxy-port: 7894

proxy-providers:
  provider1:
    type: http
    url: https://raw.githubusercontent.com/peasoft/NoMoreWalls/refs/heads/master/list.meta.yml
    path: ./proxy_providers/provider1.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://cp.cloudflare.com
      interval: 300

proxy-groups:
- name: PROXY
  type: fallback
  proxies: [DIRECT,香港,新加坡,台湾,美国,日本,其它地区]
  url: https://cp.cloudflare.com
  interval: 300
- name: 香港
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)港|hk|hongkong|hong kong"
  url: https://cp.cloudflare.com
  interval: 300
- name: 台湾
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)台|tw|taiwan"
  url: https://cp.cloudflare.com
  interval: 300
- name: 日本
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)日|jp|japan"
  url: https://cp.cloudflare.com
  interval: 300
- name: 美国
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)美|us|unitedstates|united states"
  url: https://cp.cloudflare.com
  interval: 300
- name: 新加坡
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)(新|sg|singapore)"
  url: https://cp.cloudflare.com
  interval: 300
- name: 其它地区
  type: url-test
  include-all: true
  exclude-type: direct
  filter: "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|新|sg|singapore|美|us|unitedstates)).*"
  url: https://cp.cloudflare.com
  interval: 300

rules:
- RULE-SET,anti-ad-clash_domain,REJECT
- GEOSITE,category-ads-all,REJECT
- GEOSITE,private,DIRECT
- GEOSITE,category-games@cn,DIRECT
- GEOSITE,googlefcm,DIRECT
- GEOSITE,gfw,PROXY
- GEOSITE,tiktok,PROXY
- GEOSITE,cn,DIRECT
# - GEOSITE,geolocation-!cn,PROXY
- GEOIP,private,DIRECT,no-resolve
- GEOIP,cn,DIRECT
- GEOIP,telegram,PROXY
- IP-CIDR,8.8.4.0/24,PROXY
- IP-CIDR,8.8.8.0/24,PROXY
- MATCH,DIRECT

rule-providers:
  anti-ad-clash_domain:
    type: http
    url: https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml
    path: ./rule_providers/anti-ad-clash.yaml
    interval: 86400
    behavior: domain
    format: yaml
